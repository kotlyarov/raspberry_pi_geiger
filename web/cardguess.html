<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card Guess</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f6;
      --ink: #172027;
      --muted: #64727a;
      --line: #d7dedc;
      --panel: #ffffff;
      --felt: #166b4e;
      --felt-dark: #0e4c38;
      --accent: #0f766e;
      --red: #b42318;
      --blue: #1d4ed8;
      --shadow: 0 18px 44px rgba(22, 32, 36, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(15, 118, 110, 0.1), rgba(245, 247, 246, 0) 320px),
        var(--bg);
    }

    main {
      width: min(1060px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 26px;
    }

    .home-link {
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 760;
      text-decoration: none;
    }

    .home-link:hover,
    .home-link:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
      gap: 30px;
      align-items: end;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      max-width: 680px;
      font-size: clamp(2.35rem, 7vw, 5.7rem);
      line-height: 0.95;
      font-weight: 830;
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.16rem);
      line-height: 1.45;
    }

    .table {
      position: relative;
      overflow: hidden;
      min-height: 500px;
      border-radius: 8px;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.06), transparent 28%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 52px),
        linear-gradient(145deg, var(--felt), var(--felt-dark));
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 38px);
    }

    .play-area {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(16px, 4vw, 34px);
      align-items: center;
      min-height: 330px;
    }

    .card-slot {
      display: grid;
      justify-items: center;
      gap: 14px;
    }

    .slot-label {
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.78rem;
      font-weight: 760;
      text-transform: uppercase;
    }

    .playing-card {
      position: relative;
      display: grid;
      place-items: center;
      width: min(240px, 36vw);
      aspect-ratio: 5 / 7;
      border: 1px solid #cbd3d4;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 20px 36px rgba(0, 0, 0, 0.18);
    }

    .playing-card.shown {
      color: var(--red);
      transform: rotate(-3deg);
    }

    .playing-card.hidden {
      overflow: hidden;
      border-color: #b7c5ec;
      background:
        linear-gradient(135deg, rgba(29, 78, 216, 0.92) 25%, transparent 25%) 0 0 / 22px 22px,
        linear-gradient(315deg, rgba(29, 78, 216, 0.92) 25%, transparent 25%) 0 0 / 22px 22px,
        #e7eeff;
      color: #ffffff;
      transform: rotate(4deg);
    }

    .corner {
      position: absolute;
      top: 16px;
      left: 16px;
      display: grid;
      gap: 3px;
      font-size: 1.2rem;
      font-weight: 850;
      line-height: 1;
      text-align: center;
    }

    .corner.bottom {
      inset: auto 16px 16px auto;
      transform: rotate(180deg);
    }

    .rank {
      font-size: clamp(4.4rem, 12vw, 8rem);
      font-weight: 880;
      line-height: 1;
    }

    .suit {
      color: var(--red);
      font-size: 0.76rem;
      font-weight: 820;
      text-transform: uppercase;
    }

    .question {
      display: grid;
      place-items: center;
      width: 46%;
      aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      font-size: clamp(4rem, 11vw, 7rem);
      font-weight: 900;
      line-height: 1;
    }

    .guess-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.18);
    }

    .guess-fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      padding: 0 12px;
      font-weight: 740;
    }

    .field span {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .button {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 6px;
      background: #ffffff;
      color: var(--felt-dark);
      padding: 0 18px;
      font: inherit;
      font-weight: 820;
    }

    @media (max-width: 820px) {
      main {
        width: min(100vw - 22px, 560px);
        padding-top: 20px;
      }

      header,
      .play-area,
      .guess-panel,
      .guess-fields {
        grid-template-columns: 1fr;
      }

      header {
        gap: 12px;
      }

      .table {
        min-height: 0;
      }

      .playing-card {
        width: min(230px, 70vw);
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a class="home-link" href="./index.html">Back to index</a>
      <div class="status">CSS placeholder</div>
    </div>

    <header>
      <h1>Card Guess</h1>
      <p class="summary">A future page for drawing two cards, showing one, and guessing the hidden card.</p>
    </header>

    <section class="table" aria-label="Card guess preview">
      <div class="play-area">
        <div class="card-slot">
          <div class="slot-label">Shown card</div>
          <div class="playing-card shown">
            <div class="corner">
              <span>Q</span>
              <span class="suit">Heart</span>
            </div>
            <div class="rank">Q</div>
            <div class="corner bottom">
              <span>Q</span>
              <span class="suit">Heart</span>
            </div>
          </div>
        </div>

        <div class="card-slot">
          <div class="slot-label">Hidden card</div>
          <div class="playing-card hidden">
            <div class="question">?</div>
          </div>
        </div>
      </div>

      <div class="guess-panel">
        <div class="guess-fields" aria-hidden="true">
          <div class="field"><span>Rank</span>?</div>
          <div class="field"><span>Suit</span>?</div>
          <div class="field"><span>Deck</span>1 of 52</div>
        </div>
        <div class="button" aria-hidden="true">Guess</div>
      </div>
    </section>
  </main>
</body>
</html>
