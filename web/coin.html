<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coin Toss</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f8;
      --panel: #ffffff;
      --ink: #172027;
      --muted: #5c6770;
      --line: #d9e0e4;
      --field: #fbfcfd;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --gold: #dcb85f;
      --gold-dark: #7a5419;
      --gold-light: #fff1a8;
      --danger: #b42318;
      --warn: #9f580a;
      --shadow: 0 18px 48px rgba(19, 31, 36, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 18%, rgba(220, 184, 95, 0.28), transparent 28rem),
        linear-gradient(180deg, rgba(15, 118, 110, 0.08), rgba(245, 247, 248, 0) 360px),
        var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    main {
      min-height: 100vh;
      width: min(1040px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 26px 0 52px;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
    }

    .home-link {
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 760;
      text-decoration: none;
    }

    .home-link:hover,
    .home-link:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(1.7rem, 4vw, 3.8rem);
      line-height: 1;
      font-weight: 820;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: end;
      gap: 10px;
    }

    .settings-button,
    .help-button,
    .close-button,
    .done-button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      padding: 0 16px;
      font-weight: 780;
    }

    .help-button {
      width: 42px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      color: var(--accent);
      padding: 0;
      font-size: 1.08rem;
      font-weight: 850;
    }

    .help-button:hover,
    .help-button:focus-visible {
      border-color: rgba(15, 118, 110, 0.5);
      background: #edf6f5;
      outline: none;
    }

    .settings-button:hover,
    .settings-button:focus-visible,
    .done-button:hover,
    .done-button:focus-visible {
      background: var(--accent-strong);
      outline: none;
    }

    .close-button {
      width: 42px;
      padding: 0;
      background: #eef4f2;
      color: var(--ink);
      font-size: 1.45rem;
      line-height: 1;
    }

    .close-button:hover,
    .close-button:focus-visible {
      background: #dfe9e6;
      outline: none;
    }

    .coin-stage {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 28px;
      min-height: 640px;
      padding: 36px 0 12px;
      text-align: center;
    }

    .coin-button {
      width: min(58vw, 430px);
      min-width: 230px;
      aspect-ratio: 1;
      border: 0;
      border-radius: 50%;
      padding: 0;
      background: transparent;
      perspective: 1100px;
      outline-offset: 12px;
    }

    .coin-button:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.35);
    }

    .coin-button:disabled {
      cursor: wait;
    }

    .coin {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: idle-spin 7.5s linear infinite;
    }

    .coin-button.is-counting .coin {
      animation: fast-spin 340ms linear infinite;
    }

    .coin.show-a {
      animation: settle-a 620ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .coin.show-b {
      animation: settle-b 620ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .coin-face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border: 9px solid #c99b3f;
      border-radius: 50%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transform: rotateY(0deg) translateZ(1px);
      background:
        radial-gradient(circle at 34% 27%, var(--gold-light) 0 10%, transparent 11%),
        radial-gradient(circle at 50% 52%, rgba(255, 255, 255, 0.12), transparent 40%),
        linear-gradient(145deg, #f4d987, var(--gold));
      color: var(--gold-dark);
      font-size: clamp(7rem, 22vw, 15rem);
      font-weight: 900;
      line-height: 1;
      box-shadow:
        0 32px 42px rgba(84, 61, 24, 0.2),
        inset 0 0 0 12px rgba(122, 84, 25, 0.12),
        inset 0 -22px 38px rgba(93, 63, 18, 0.15);
    }

    .coin-face::before {
      content: "";
      position: absolute;
      inset: 11%;
      border: 2px solid rgba(122, 84, 25, 0.2);
      border-radius: 50%;
    }

    .coin-face-b {
      transform: rotateY(180deg) translateZ(1px);
    }

    .result-line {
      min-height: 42px;
      display: grid;
      place-items: center;
      max-width: min(620px, 92vw);
      color: var(--muted);
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 760;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .result-line.error {
      color: var(--danger);
    }

    .result-line.waiting {
      color: var(--warn);
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(16, 28, 32, 0.36);
    }

    .settings-drawer {
      position: fixed;
      z-index: 30;
      top: 0;
      bottom: 0;
      right: 0;
      width: min(410px, calc(100vw - 28px));
      overflow-y: auto;
      border-left: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      transform: translateX(105%);
      transition: transform 180ms ease;
    }

    .settings-drawer.open {
      transform: translateX(0);
    }

    .drawer-inner {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px;
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h2 {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1;
      letter-spacing: 0;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .span-2 {
      grid-column: span 2;
    }

    label {
      color: #2d3a42;
      font-size: 0.86rem;
      font-weight: 650;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #c8d2d8;
      border-radius: 6px;
      background: var(--field);
      color: var(--ink);
      padding: 0 11px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-height: 0;
      accent-color: var(--accent);
    }

    .checkbox-row {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding-top: 20px;
    }

    .settings-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
    }

    .drawer-actions {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .done-button {
      width: 100%;
    }

    .help-dialog {
      width: min(430px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: var(--shadow);
      padding: 0;
    }

    .help-dialog::backdrop {
      background: rgba(16, 28, 32, 0.36);
    }

    .help-inner {
      display: grid;
      gap: 16px;
      padding: 22px;
    }

    .help-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .help-dialog p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.48;
    }

    @keyframes idle-spin {
      from {
        transform: rotateY(0deg);
      }
      to {
        transform: rotateY(360deg);
      }
    }

    @keyframes fast-spin {
      from {
        transform: rotateY(0deg);
      }
      to {
        transform: rotateY(360deg);
      }
    }

    @keyframes settle-a {
      to {
        transform: rotateY(0deg);
      }
    }

    @keyframes settle-b {
      to {
        transform: rotateY(180deg);
      }
    }

    @media (max-width: 740px) {
      main {
        width: min(100vw - 22px, 560px);
        padding-top: 18px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
      }

      .home-link {
        order: 1;
      }

      .settings-button {
        order: 2;
      }

      .top-actions {
        order: 2;
      }

      h1 {
        grid-column: 1 / -1;
        order: 3;
        text-align: left;
      }

      .coin-stage {
        min-height: calc(100vh - 140px);
        gap: 22px;
      }

      .coin-button {
        width: min(78vw, 340px);
      }

      .settings-grid {
        grid-template-columns: 1fr;
      }

      .span-2 {
        grid-column: auto;
      }

      .checkbox-row {
        padding-top: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <a class="home-link" href="./index.html">Index</a>
      <h1>Coin Toss</h1>
      <div class="top-actions">
        <button class="help-button" id="helpButton" type="button" aria-label="How the toss works" title="How the toss works">?</button>
        <button class="settings-button" id="settingsButton" type="button" aria-controls="settingsDrawer" aria-expanded="false">Settings</button>
      </div>
    </header>

    <section class="coin-stage" aria-live="polite">
      <button class="coin-button" id="coinButton" type="button" aria-label="Toss coin">
        <span class="coin" id="coin" aria-hidden="true">
          <span class="coin-face coin-face-a">A</span>
          <span class="coin-face coin-face-b">B</span>
        </span>
      </button>
      <div class="result-line" id="resultLine">Ready</div>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>

  <aside class="settings-drawer" id="settingsDrawer" aria-labelledby="settingsTitle" aria-hidden="true">
    <div class="drawer-inner">
      <div class="drawer-header">
        <h2 id="settingsTitle">Settings</h2>
        <button class="close-button" id="closeSettingsButton" type="button" aria-label="Close settings">x</button>
      </div>

      <form id="geigerForm">
        <div class="settings-grid">
          <div class="field span-2">
            <label for="piHost">Pi IP or host</label>
            <input id="piHost" name="piHost" type="text" inputmode="url" autocomplete="off" placeholder="192.168.2.9" required>
          </div>

          <div class="field span-2">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" maxlength="10" autocomplete="off" required>
          </div>

          <div class="field">
            <label for="seconds">Seconds</label>
            <input id="seconds" name="seconds" type="number" min="0.1" step="0.1" value="10" required>
          </div>

          <div class="field">
            <label for="pin">GPIO pin</label>
            <input id="pin" name="pin" type="number" min="0" step="1" value="17">
          </div>

          <div class="field">
            <label for="pull">Pull resistor</label>
            <select id="pull" name="pull">
              <option value="up" selected>up</option>
              <option value="down">down</option>
              <option value="off">off</option>
            </select>
          </div>

          <div class="field">
            <label for="active">Active state</label>
            <select id="active" name="active">
              <option value="low">low</option>
              <option value="high" selected>high</option>
            </select>
          </div>

          <div class="field">
            <label for="bounceMs">Bounce ms</label>
            <input id="bounceMs" name="bounceMs" type="number" min="0" step="1" value="0">
          </div>

          <div class="field">
            <label for="pollIntervalMs">Poll interval ms</label>
            <input id="pollIntervalMs" name="pollIntervalMs" type="number" min="0.1" step="0.1" value="0.1">
          </div>

          <label class="checkbox-row" for="simulate">
            <input id="simulate" name="simulate" type="checkbox">
            Simulate
          </label>
        </div>

        <p class="settings-note">The Pi API uses HTTP on port 80.</p>

        <div class="drawer-actions">
          <button class="done-button" id="doneSettingsButton" type="button">Done</button>
        </div>
      </form>
    </div>
  </aside>

  <dialog class="help-dialog" id="helpDialog" aria-labelledby="helpTitle">
    <div class="help-inner">
      <div class="help-header">
        <h2 id="helpTitle">How it works</h2>
        <button class="close-button" id="closeHelpButton" type="button" aria-label="Close help">x</button>
      </div>
      <p>The toss is powered by impulses counted from the real Geiger counter. After the count finishes, an odd number of impulses lands on A, and an even number lands on B.</p>
    </div>
  </dialog>

  <script>
    const form = document.getElementById("geigerForm");
    const helpButton = document.getElementById("helpButton");
    const helpDialog = document.getElementById("helpDialog");
    const closeHelpButton = document.getElementById("closeHelpButton");
    const settingsButton = document.getElementById("settingsButton");
    const closeSettingsButton = document.getElementById("closeSettingsButton");
    const doneSettingsButton = document.getElementById("doneSettingsButton");
    const settingsDrawer = document.getElementById("settingsDrawer");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const coinButton = document.getElementById("coinButton");
    const coin = document.getElementById("coin");
    const resultLine = document.getElementById("resultLine");
    const field = (id) => document.getElementById(id);
    const savedHostKey = "geiger.piHost";
    const savedPasswordKey = "geiger.password";
    let isCounting = false;

    function loadStoredValue(key) {
      try {
        return localStorage.getItem(key) || "";
      } catch (error) {
        return "";
      }
    }

    function storeValue(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch (error) {
        // Some locked-down browser modes disable localStorage for local files.
      }
    }

    function normalizeHost(value) {
      return value
        .trim()
        .replace(/^https?:\/\//i, "")
        .replace(/\/.*$/, "");
    }

    function restoreConnectionDetails() {
      const savedHost = loadStoredValue(savedHostKey);
      const savedPassword = loadStoredValue(savedPasswordKey);
      if (savedHost) {
        field("piHost").value = savedHost;
      }
      if (savedPassword) {
        field("password").value = savedPassword;
      }
    }

    function saveConnectionDetails() {
      storeValue(savedHostKey, normalizeHost(field("piHost").value));
      storeValue(savedPasswordKey, field("password").value.trim());
    }

    function openSettings() {
      drawerBackdrop.hidden = false;
      settingsDrawer.classList.add("open");
      settingsDrawer.setAttribute("aria-hidden", "false");
      settingsButton.setAttribute("aria-expanded", "true");
    }

    function closeSettings() {
      settingsDrawer.classList.remove("open");
      settingsDrawer.setAttribute("aria-hidden", "true");
      settingsButton.setAttribute("aria-expanded", "false");
      drawerBackdrop.hidden = true;
      settingsButton.focus();
    }

    function openHelp() {
      if (typeof helpDialog.showModal === "function") {
        helpDialog.showModal();
      } else {
        helpDialog.setAttribute("open", "");
      }
    }

    function closeHelp() {
      helpDialog.close();
      helpButton.focus();
    }

    function setResult(text, type = "") {
      resultLine.className = `result-line${type ? ` ${type}` : ""}`;
      resultLine.textContent = text;
    }

    function buildRequestUrl() {
      const host = normalizeHost(field("piHost").value);
      const url = new URL(`http://${host}/geiger`);
      const params = url.searchParams;
      params.set("pwd", field("password").value.trim());
      params.set("s", field("seconds").value);
      params.set("pin", field("pin").value);
      params.set("pull", field("pull").value);
      params.set("active", field("active").value);
      params.set("bounce-ms", field("bounceMs").value);
      params.set("poll-interval-ms", field("pollIntervalMs").value);
      if (field("simulate").checked) {
        params.set("simulate", "1");
      }
      return url;
    }

    function startCoinSpin() {
      coin.classList.remove("show-a", "show-b");
      coinButton.classList.add("is-counting");
      coinButton.disabled = true;
      setResult("Counting...", "waiting");
    }

    function stopCoinSpin() {
      coinButton.classList.remove("is-counting");
      coinButton.disabled = false;
    }

    function showCoinSide(side) {
      coin.classList.remove("show-a", "show-b");
      coin.classList.add(side === "A" ? "show-a" : "show-b");
    }

    function displayResults(result) {
      const impulses = Number(result.impulses);
      const side = impulses % 2 === 1 ? "A" : "B";
      showCoinSide(side);
      setResult(`Impulses: ${result.impulses}`);
    }

    function errorMessageFor(error) {
      if (String(error.message).includes("Failed to fetch") || error.name === "TypeError") {
        return "Browser could not reach the Pi API.";
      }
      if (error.message === "unauthorized") {
        return "Password rejected by the Pi.";
      }
      if (error.message === "busy") {
        return "The Pi is already counting.";
      }
      return `Request failed: ${error.message}`;
    }

    async function tossCoin() {
      if (isCounting) {
        return;
      }

      if (!form.checkValidity()) {
        openSettings();
        requestAnimationFrame(() => form.reportValidity());
        setResult("Complete settings first.", "error");
        return;
      }

      let url;
      try {
        saveConnectionDetails();
        url = buildRequestUrl();
      } catch (error) {
        openSettings();
        setResult("Check the Pi IP or host value.", "error");
        return;
      }

      isCounting = true;
      startCoinSpin();

      try {
        const response = await fetch(url.href, {
          method: "GET",
          cache: "no-store",
          mode: "cors"
        });

        const data = await response.json().catch(() => null);
        if (!response.ok) {
          const detail = data && data.error ? data.error : `HTTP ${response.status}`;
          throw new Error(detail);
        }

        displayResults(data);
      } catch (error) {
        setResult(errorMessageFor(error), "error");
      } finally {
        stopCoinSpin();
        isCounting = false;
      }
    }

    restoreConnectionDetails();

    field("piHost").addEventListener("input", saveConnectionDetails);
    field("password").addEventListener("input", saveConnectionDetails);
    helpButton.addEventListener("click", openHelp);
    closeHelpButton.addEventListener("click", closeHelp);
    settingsButton.addEventListener("click", openSettings);
    closeSettingsButton.addEventListener("click", closeSettings);
    doneSettingsButton.addEventListener("click", closeSettings);
    drawerBackdrop.addEventListener("click", closeSettings);
    coinButton.addEventListener("click", tossCoin);

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      tossCoin();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && settingsDrawer.classList.contains("open")) {
        closeSettings();
      }
    });
  </script>
</body>
</html>
